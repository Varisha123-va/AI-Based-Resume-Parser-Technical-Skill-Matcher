<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AI Resume Analyzer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Modern Dark AI Theme */
        * { box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        
        body { 
            background: radial-gradient(circle at top, #1e293b, #0f172a); /* Deep Dark Blue */
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            color: #fff;
        }

        /* Glassmorphism Card */
        .login-card { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(15px); 
            padding: 40px; 
            border-radius: 20px; 
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5); 
            width: 100%; 
            max-width: 400px; 
            text-align: center; 
        }

        h2 { margin-bottom: 5px; color: #00d4ff; font-size: 28px; letter-spacing: 1px; }
        p { color: #94a3b8; margin-bottom: 30px; font-size: 14px; }

        .input-group { margin-bottom: 20px; position: relative; text-align: left; }
        
        /* Icon color neon blue */
        .input-group i { 
            position: absolute; 
            left: 15px; 
            top: 50%; 
            transform: translateY(-50%); 
            color: #00d4ff; 
        }

        input { 
            width: 100%; 
            padding: 14px 15px 14px 45px; 
            background: rgba(255, 255, 255, 0.07); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 12px; 
            outline: none; 
            color: #fff;
            transition: 0.3s ease; 
        }

        input::placeholder { color: #64748b; }

        input:focus { 
            border-color: #00d4ff; 
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.2); 
        }

        /* Neon Gradient Button */
        .login-btn { 
            width: 100%; 
            padding: 14px; 
            background: linear-gradient(135deg, #00d4ff 0%, #0083fe 100%); 
            color: white; 
            border: none; 
            border-radius: 12px; 
            font-size: 16px; 
            cursor: pointer; 
            font-weight: 700; 
            margin-top: 15px; 
            text-transform: uppercase;
            transition: 0.4s;
        }

        .login-btn:hover { 
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 212, 255, 0.4); 
            filter: brightness(1.1);
        }

        /* Divider & Google Button Styling */
        .divider { margin: 25px 0; position: relative; }
        .divider::before { content: ""; position: absolute; width: 100%; height: 1px; background: rgba(255,255,255,0.1); top: 50%; left: 0; }
        .divider span { background: #131c2f; padding: 0 15px; position: relative; color: #64748b; font-size: 12px; }

        .google-btn { 
            width: 100%; 
            padding: 12px; 
            background: rgba(255, 255, 255, 0.05); 
            color: #fff; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 12px; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 12px; 
            font-weight: 500; 
            transition: 0.3s;
        }

        .google-btn:hover { background: rgba(255, 255, 255, 0.1); border-color: rgba(255, 255, 255, 0.3); }
        
        /* Subtle animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .login-card { animation: fadeIn 0.8s ease-out; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Welcome Back</h2>
        <p>AI-Powered Resume Analysis</p>
        
        <form action="/login" method="POST" autocomplete="off">
            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" name="email" id="email" placeholder="Email Address" required autocomplete="email">
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" name="password" id="password" placeholder="Password" required autocomplete="new-password">
            </div>
            <button type="submit" class="login-btn">Login</button>
        </form>

        
    </div>
</body>
</html>
